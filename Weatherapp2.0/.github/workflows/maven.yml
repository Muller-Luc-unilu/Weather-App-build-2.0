name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  JDK_DIST: 'temurin'
  JDK_VERSION: '25'

jobs:

  build-test-package-store:
    name: Build, test, and store package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JDK_DIST }} version ${{ env.JDK_VERSION }} and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JDK_DIST }}
          java-version: ${{ env.JDK_VERSION }}
          cache: 'maven'

      - name: Build, test, and package with Maven
        # We use clean to make sure we don't have any leftover files from previous builds.
        run: mvn --batch-mode --update-snapshots clean verify

      - name: Upload (store) JAR artifact to allow later download
        uses: actions/upload-artifact@v7
        with:
          name: github-ci-jar
          path: target/*.jar
